<!DOCTYPE html>
<html>

<head>
<title>RunTZ Dev Panel</title>

<style>
body {
    margin:0;
    background:#0b0b0f;
    color:white;
    font-family:Arial;
    text-align:center;
    padding-top:80px;
}

.box {
    background:#17171f;
    padding:30px;
    border-radius:20px;
    width:350px;
    margin:auto;
}

input {
    padding:12px;
    border-radius:10px;
    border:none;
    width:80%;
}

button {
    margin-top:15px;
    padding:12px 20px;
    border-radius:10px;
    border:none;
    cursor:pointer;
}

.score {
    font-size:35px;
    margin:20px;
}
</style>

</head>


<body>


<div class="box">

<h1>❤️ RunTZ Dev Panel</h1>

<p>Edit your challenge score</p>


<input id="newScore" placeholder="Enter score">


<br>


<button onclick="changeScore()">
Update Score
</button>


<div class="score" id="score">
0
</div>


</div>



<script>

let currentScore =
localStorage.getItem("RunTZDevScore") || 0;


document.getElementById("score").innerHTML =
currentScore;



function changeScore(){

let score =
document.getElementById("newScore").value;


localStorage.setItem(
"RunTZDevScore",
score
);


document.getElementById("score").innerHTML =
score;

}

</script>


</body>

</html>
